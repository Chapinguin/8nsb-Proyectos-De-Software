<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Hospital HIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <header class="login-header">
      <h1>🏥 Hospital HIS</h1>
      <p>Bienvenido de nuevo. Por favor, ingresa tus credenciales.</p>
    </header>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required autofocus />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary btn-login">
        Ingresar al Sistema
      </button>
    </form>
  </div>

  <!-- Toast Container para errores -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="./js/ui-core.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
